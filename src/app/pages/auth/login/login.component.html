<div class="login-container flex justify-content-center align-items-center min-h-screen">
  <div class="login-card p-5 w-full sm:w-30rem">

    <div class="flex flex-column align-items-center mb-4">
      <img
        src="https://dictacolombia.com/wp-content/uploads/2022/10/logo-yellow.webp"
        alt="Logo"
        class="login-logo mb-3"
      />

      <h2 class="login-title text-center">
        Bienvenido a tu Plataforma Dictariana
      </h2>

      <span class="login-subtitle text-center">
        No tienes una cuenta?
        <a routerLink="/auth/register" class="login-link">
          Crea una ahora!
        </a>
      </span>
    </div>

    <form
      [formGroup]="loginFormPresenter.Form"
      (ngSubmit)="submit()"
    >

      <div class="field mb-3">
        <label for="email1" class="login-label">Email</label>

        <input
          id="email"
          type="email"
          pInputText
          formControlName="email"
          class="login-input w-full"
          placeholder="Ingresa tu Email"
        />
        <small
          class="p-error"
          dictaErrorForm
          [control]="loginFormPresenter.Form.get('email')">
        </small>
        
      </div>

      <div class="field mb-3">
        <label for="password1" class="login-label">Contraseña</label>

        <p-password
          id="password1"
          formControlName="password"
          class="w-full p-3 rounded bg-gray-900 text-white border-none focus:ring-2 focus:ring-cyan-400"
        />
        <small
          class="p-error"
          dictaErrorForm
          [control]="loginFormPresenter.Form.get('password')">
        </small>
      </div>

      <div class="flex align-items-center justify-content-between mb-4">

        <div class="flex align-items-center">
          <p-checkbox
            inputId="rememberme"
            [binary]="true"
            styleClass="mr-2"
          ></p-checkbox>

          <label for="rememberme" class="login-label">
            Recuérdame
          </label>
        </div>

        <a class="login-link cursor-pointer">
          Olvidaste la Contraseña?
        </a>

      </div>

      <button
        type="submit"
        pButton
        pRipple
        label="Ingresar"
        icon="pi pi-user"
        class="login-button w-full mb-3"
        [disabled]="loginFormPresenter.Invalid"
      ></button>

      <button
        type="button"
        pButton
        pRipple
        label="Ingresar con Google"
        icon="pi pi-google"
        class="login-google-button w-full"
        (click)="loginWithGoogle()"
      ></button>

    </form>
  </div>
</div>
