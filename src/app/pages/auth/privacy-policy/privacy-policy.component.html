<div class="min-h-screen bg-black py-10 px-4 flex justify-center">
  <div class="w-full max-w-3xl">

    <!-- Header -->
    <div class="flex flex-col items-center mb-8">
      <img src="https://res.cloudinary.com/djwspay9f/image/upload/v1782180945/Mesa_de_trabajo_1_x72aap.png"
           alt="Logo" class="w-20 h-20 mb-4"/>
      <h1 class="text-2xl md:text-3xl font-bold text-white text-center">
        Política de Privacidad y Tratamiento de Datos Personales
      </h1>
      <span class="text-gray-400 text-sm mt-2 text-center">
        Versión 1.0 · Vigencia 2026 · Club Social Digital Dicta SAS
      </span>
    </div>

    <!-- Contenido reutilizable -->
    <app-privacy-policy-content></app-privacy-policy-content>

    <!-- Botón volver -->
    <div class="flex justify-center mt-6">
      <button type="button" pButton pRipple
              label="Volver al registro"
              class="w-full md:w-auto px-8 py-3 text-lg font-semibold rounded-lg
                     bg-gradient-to-r from-teal-400 to-cyan-500 border-0 shadow-md
                     text-black hover:from-cyan-400 hover:to-teal-500
                     transition flex items-center justify-center gap-2"
              (click)="goBack()">
      </button>
    </div>

  </div>
</div>
