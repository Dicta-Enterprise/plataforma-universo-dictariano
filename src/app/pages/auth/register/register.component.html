<div class="min-h-screen flex items-center justify-center bg-black">
  <div class="bg-black bg-opacity-80 rounded-2xl shadow-2xl px-6 py-10 w-full max-w-md">

    <div class="flex flex-col items-center mb-6">
      <img
        src="https://res.cloudinary.com/djwspay9f/image/upload/v1782180945/Mesa_de_trabajo_1_x72aap.png"
        alt="Logo"
        class="w-24 h-24 md:w-32 md:h-32 mb-3"
      />
      <h2 class="text-2xl md:text-3xl font-bold text-white mb-2 text-center">
        Crea tu cuenta
      </h2>
      <span class="text-gray-400 text-center">
        Únete a la Plataforma Dictariana
      </span>
      <div class="text-gray-400 text-center mt-2">
        ¿Ya tienes una cuenta?
        <a 
          routerLink="/auth/login"
          class="font-semibold text-blue-400 hover:underline ml-1 cursor-pointer">
          Inicia sesión aquí!
        </a>
      </div>
      <button
        type="button"
        pButton
        pRipple
        label="Ingresar"
        icon="pi pi-google"
        class="w-1/2 py-3 text-xs font-semibold rounded-lg
              bg-gradient-to-r from-zinc-500 to-zinc-800 border-0 shadow-md 
              text-white hover:from-pink-400 hover:to-red-500 
              transition flex items-center justify-center gap-2
              mt-5"
        (click)="loginWithGoogle()">
      </button>
    </div>

    <form [formGroup]="registerFormPresenter.Form">

      <div class="mb-4">
        <label for="username" class="block text-gray-300 font-medium mb-1">Username</label>
        <input
          id="username"
          type="text"
          pInputText
          formControlName="username"
          placeholder="Ingresa tu usuario"
          class="w-full p-3 rounded bg-gray-900 text-white border-none focus:ring-2 focus:ring-cyan-400"
        />
        <small
          class="p-error"
          dictaErrorForm
          [control]="registerFormPresenter.username">
        </small>
      </div>

      <div class="mb-4">
        <label for="email" class="block text-gray-300 font-medium mb-1">Email</label>
        <input
          id="email"
          type="email"
          pInputText
          formControlName="email"
          placeholder="Ingresa tu correo"
          class="w-full p-3 rounded bg-gray-900 text-white border-none focus:ring-2 focus:ring-cyan-400"
        />
        <small
          class="p-error"
          dictaErrorForm
          [control]="registerFormPresenter.email">
        </small>
      </div>

      <div class="mb-4">
        <label for="password" class="block text-gray-300 font-medium mb-1">Contraseña</label>
        <p-password
          id="password"
          formControlName="password"
          [toggleMask]="true"
          class="w-full block"
          styleClass="w-full"
          inputStyleClass="w-full p-3 rounded bg-gray-900 text-white border-none focus:ring-2 focus:ring-cyan-400"
          placeholder="Ingresa tu contraseña"
          promptLabel="Ingresa una contraseña"
          weakLabel="Débil"
          mediumLabel="Media"
          strongLabel="Fuerte"
        ></p-password>
        <small
          class="p-error"
          dictaErrorForm
          [control]="registerFormPresenter.Form.get('password')">
        </small>
      </div>

      <div class="mb-6">
        <label for="confirmPassword" class="block text-gray-300 font-medium mb-1">Confirmar contraseña</label>
        <p-password
          id="confirmPassword"
          formControlName="confirmPassword"
          [toggleMask]="true"
          class="w-full block"
          styleClass="w-full"
          inputStyleClass="w-full p-3 rounded bg-gray-900 text-white border-none focus:ring-2 focus:ring-cyan-400"
          placeholder="Confirma tu contraseña"
          promptLabel="Confirma tu contraseña"
          weakLabel="Débil"
          mediumLabel="Media"
          strongLabel="Fuerte"
        ></p-password>
        <small
          class="p-error"
          dictaErrorForm
          [control]="registerFormPresenter.Form.get('confirmPassword')">
        </small>
      </div>
   
      <div
        class="flex items-center gap-3 mb-3 text-sm"
        tabindex="0"
        (click)="onCheckboxClick($event)"
        (keydown.enter)="onCheckboxClick($event)"
        (keydown.space)="onCheckboxClick($event)">
        <p-checkbox
          id="termsofuse"
          [binary]="true"
          styleClass="mr-2"
          formControlName="acceptTerms"
          [readonly]="!politicaLeida">
        </p-checkbox>
        <span class="text-gray-400">
          He leído y acepto la
          <a
            tabindex="0"
            role="button"
            class="text-blue-400 hover:underline cursor-pointer"
            (click)="abrirPolitica()"
            (keydown.enter)="abrirPolitica()"
            (keydown.space)="abrirPolitica()">
            Política de Privacidad y Tratamiento de Datos
          </a>
        </span>
      </div>

      <small *ngIf="!politicaLeida" class="text-yellow-400 text-xs block mb-4">
        <i class="pi pi-info-circle mr-1"></i>
        Debes leer y aceptar la Política de Privacidad para continuar.
      </small>
      <small *ngIf="politicaLeida && !registerFormPresenter.Form.get('acceptTerms')?.value"
            class="text-green-400 text-xs block mb-4">
        <i class="pi pi-check-circle mr-1"></i>
        Lectura completada. Marca la casilla para aceptar.
      </small>

      

      <button
        type="button"
        pButton
        pRipple
        label="Registrarme"
        icon="pi pi-user-plus"
        class="w-full py-3 text-lg font-semibold rounded-lg
              bg-gradient-to-r from-teal-400 to-cyan-500 border-0 shadow-md 
              text-black hover:from-cyan-400 hover:to-teal-500 hover:text-black 
              transition mb-4 flex items-center justify-center gap-2"
        (click)="submit()"
        [disabled]="!politicaLeida || registerFormPresenter.Form.invalid">
      </button>

    </form>

  </div>

  <!-- Modal Política de Privacidad -->
  <app-privacy-policy-modal
    [(visible)]="mostrarModal"
    (politicaLeida)="onPoliticaLeida()">
  </app-privacy-policy-modal>
</div>
