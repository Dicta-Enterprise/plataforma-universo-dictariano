<div class="forgot-container flex justify-content-center align-items-center min-h-screen">
  <div class="forgot-card p-5 w-full sm:w-30rem">

    <div class="flex flex-column align-items-center mb-4">
      <img src="https://res.cloudinary.com/djwspay9f/image/upload/v1782180945/Mesa_de_trabajo_1_x72aap.png"
           alt="Logo" class="forgot-logo mb-3"/>
      <h2 class="forgot-title text-center">Nueva contraseña</h2>
      <span class="forgot-subtitle text-center">
        Elige una contraseña segura con al menos 8 caracteres y un número.
      </span>
    </div>

    <form [formGroup]="presenter.Form" (ngSubmit)="submit()">

      <div class="field mb-3">
        <label for="newPassword" class="forgot-label">Nueva contraseña</label>
        <p-password inputId="newPassword"
                    formControlName="newPassword"
                    [toggleMask]="true"
                    [feedback]="false"
                    class="w-full"
                    placeholder="Nueva contraseña">
        </p-password>

        <ul class="password-rules mt-2" *ngIf="presenter.Form.get('newPassword')?.value">
          <li [class.rule-ok]="passwordRules.minLength" [class.rule-fail]="!passwordRules.minLength">
            <i class="pi" [class.pi-check-circle]="passwordRules.minLength" [class.pi-times-circle]="!passwordRules.minLength"></i>
            Mínimo 8 caracteres
          </li>
          <li [class.rule-ok]="passwordRules.hasUpper" [class.rule-fail]="!passwordRules.hasUpper">
            <i class="pi" [class.pi-check-circle]="passwordRules.hasUpper" [class.pi-times-circle]="!passwordRules.hasUpper"></i>
            Al menos una mayúscula
          </li>
          <li [class.rule-ok]="passwordRules.hasLower" [class.rule-fail]="!passwordRules.hasLower">
            <i class="pi" [class.pi-check-circle]="passwordRules.hasLower" [class.pi-times-circle]="!passwordRules.hasLower"></i>
            Al menos una minúscula
          </li>
          <li [class.rule-ok]="passwordRules.hasNumber" [class.rule-fail]="!passwordRules.hasNumber">
            <i class="pi" [class.pi-check-circle]="passwordRules.hasNumber" [class.pi-times-circle]="!passwordRules.hasNumber"></i>
            Al menos un número
          </li>
          <li [class.rule-ok]="passwordRules.hasSymbol" [class.rule-fail]="!passwordRules.hasSymbol">
            <i class="pi" [class.pi-check-circle]="passwordRules.hasSymbol" [class.pi-times-circle]="!passwordRules.hasSymbol"></i>
            Al menos un símbolo
          </li>
        </ul>
      </div>

      <div class="field mb-4">
        <label for="confirmPassword" class="forgot-label">Confirmar contraseña</label>
        <p-password inputId="confirmPassword"
                    formControlName="confirmPassword"
                    [toggleMask]="true"
                    [feedback]="false"
                    class="w-full"
                    placeholder="Confirma tu contraseña">
        </p-password>

        <div class="mt-2" *ngIf="presenter.Form.get('confirmPassword')?.value">
          <small *ngIf="!presenter.Form.hasError('passwordMismatch')" class="rule-ok">
            <i class="pi pi-check-circle"></i> Las contraseñas coinciden
          </small>
          <small *ngIf="presenter.Form.hasError('passwordMismatch')" class="rule-fail">
            <i class="pi pi-times-circle"></i> Las contraseñas no coinciden
          </small>
        </div>
      </div>

      <button type="submit" pButton pRipple
              label="Actualizar contraseña"
              icon="pi pi-lock"
              [loading]="(facade.loading$ | async) ?? false"
              [disabled]="presenter.Invalid || presenter.Form.hasError('passwordMismatch') || presenter.Form.hasError('weakPassword')"
              class="forgot-button w-full">
      </button>

    </form>
  </div>
</div>
