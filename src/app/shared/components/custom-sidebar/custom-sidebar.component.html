<button 
  *ngIf="isMobile && !sidebarVisible" 
  (click)="toggleSidebar()"
  style="position: absolute; top: 4.5rem; left: 1rem; z-index: 1000; background: #212121; border: none; color: white; padding: 0.5rem 0.75rem; border-radius: 8px; cursor: pointer; box-shadow: 0 4px 6px rgba(0,0,0,0.1);"
>
  <i class="pi pi-bars" style="font-size: 1.25rem;"></i>
</button>

<!-- Overlay oscuro (fondo semitransparente) para cerrar el drawer al hacer clic fuera -->
<div 
  *ngIf="isMobile && sidebarVisible" 
  (click)="closeSidebar()"
  (keydown.enter)="closeSidebar()"
  tabindex="0"
  style="position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); z-index: 1001;">
</div>

<div
  id="app-sidebar-11"
  [ngClass]="active ? 'bg-white' : 'bg-gray-900'"
  [style.position]="isMobile ? 'fixed' : 'sticky'"
  [style.top]="isMobile ? '0' : '0'"
  [style.alignSelf]="isMobile ? 'auto' : 'flex-start'"
  [style.top]="isMobile ? '60px' : '0'"
  [style.left]="isMobile ? '0' : 'auto'"
  [style.height]="isMobile ? 'calc(100% - 60px)' : '100vh'"

  [style.zIndex]="isMobile ? '1002' : '1'"
  [style.transform]="isMobile ? (sidebarVisible ? 'translateX(0)' : 'translateX(-100%)') : 'none'"
  [style.transition]="isMobile ? 'transform 0.3s ease-in-out' : 'none'"
  style="width: 300px; flex-shrink: 0; border-right: 1px solid var(--surface-border); user-select: none;"
  class="flex-shrink-0 border-right-1 surface-border select-none"
  >
  <div class="flex flex-column" style="height: 100%; overflow: hidden;">

    <!-- Botón cerrar dentro del sidebar (solo móvil) -->
    <div *ngIf="isMobile" class="flex justify-content-end pt-5 p-3">
      <button 
        (click)="closeSidebar()" 
        style="background: #4a4a4a; border: none; border-radius: 50%; width: 32px; height: 32px; color: white; cursor: pointer; display: flex; align-items: center; justify-content: center;">
        <i class="pi pi-times" style="font-size: 1rem;"></i>
      </button>
    </div>
    <div class="overflow-y-auto" style="flex: 1;">
      <ul class="list-none p-3 m-0" *ngFor="let item of menus">
        <li>
          <div
            pRipple
            class="p-3 flex align-items-center justify-content-between text-600 cursor-pointer"
            pStyleClass="@next"
            enterClass="hidden"
            enterActiveClass="slidedown"
            leaveToClass="hidden"
            leaveActiveClass="slideup"
          >
            <span
              class="font-bold"
              [ngClass]="
                active ? 'text-black-alpha-80 ' : 'text-white-alpha-80'
              "
              >{{ item.nombre }}</span
            >
            <i
              class="pi pi-chevron-down"
              [ngClass]="active ? 'text-black-alpha-80' : 'text-white-alpha-80'"
            ></i>
          </div>
          <ul class="list-none p-0 m-0 overflow-hidden">
            <li [routerLink]="subitem.ruta" *ngFor="let subitem of item.items">
              <a
                pRipple
                class="flex align-items-center cursor-pointer p-3 text-700 border-2 border-transparent hover:border-300 hover:bg-transparent transition-duration-150 transition-colors"
                style="border-radius: 12px"
                *ngIf="subitem.items"
                [pStyleClass]="subitem.items ? '@next' : ''"
                [enterClass]="subitem.items ? 'hidden' : ''"
                [enterActiveClass]="subitem.items ? 'slidedown' : ''"
                [leaveToClass]="subitem.items ? 'hidden' : ''"
                [leaveActiveClass]="subitem.items ? 'slideup' : ''"
              >
                <i class="{{ subitem.icono }} mr-2 text-cyan-500"></i>

                <span
                  class="font-medium"
                  [ngClass]="
                    active ? 'text-black-alpha-80' : 'text-white-alpha-80'
                  "
                  >{{ subitem.nombre }}</span
                >
                <i
                  class="pi pi-chevron-down ml-auto"
                  [ngClass]="
                    active ? 'text-black-alpha-80' : 'text-white-alpha-80'
                  "
                  *ngIf="subitem.items"
                ></i>
              </a>
              <a
                *ngIf="!subitem.items"
                pRipple
                class="flex align-items-center cursor-pointer p-3 text-700 border-2 border-transparent  transition-duration-150 transition-colors"
                style="border-radius: 12px"
                
              >
                <i class="{{ subitem.icono }} mr-2" style="color: #efefef;"></i>
                <span
                  class="font-medium"
                  [ngClass]="
                    active ? 'text-black-alpha-80' : 'text-white-alpha-80'
                  "
                  >{{ subitem.nombre }}</span
                >
                <i class="pi pi-chevron-down ml-auto" *ngIf="subitem.items"></i>
              </a>

              <ul
                class="list-none py-0 pl-3 pr-0 m-0 hidden overflow-y-hidden transition-all transition-duration-400 transition-ease-in-out"
                *ngIf="subitem.items"
              >
                <li
                  *ngFor="let subSubItem of subitem.items"
                  [routerLink]="subSubItem.ruta"
                >
                  <a
                    pRipple
                    class="flex align-items-center cursor-pointer p-3 text-700 border-2 border-transparent hover:border-300 transition-duration-150 transition-colors"
                    style="border-radius: 12px"
                  >
                    <i class="pi pi-chart-line mr-2 text-purple-500"></i>
                    <span
                      class="font-medium"
                      [ngClass]="
                        active ? 'text-black-alpha-80' : 'text-white-alpha-80'
                      "
                      >{{ subSubItem.nombre }}</span
                    >
                  </a>
                </li>
              </ul>
            </li>
          </ul>
        </li>
      </ul>
    </div>

    <div
      class=" border-top-1 surface-border p-3 flex justify-content-center gap-5"
    >
      <a
        (click)="toggleTheme()"
        (keydown.enter)="toggleTheme()"
        tabindex="0"
        pRipple
        class="cursor-pointer inline-flex align-items-center justify-content-center border-2 surface-border hover:surface-100 text-600 transition-colors transition-duration-150 border-circle"
        [ngClass]="
          active
            ? 'bg-white text-black-alpha-80 border-black-alpha-80 hover:bg-black-alpha-80 hover:text-white'
            : 'bg-gray-900 text-white-alpha-80 border-white hover:bg-white hover:text-black-alpha-80'
        "
        style="width: 40px; height: 40px"
      >
        <i class="pi  text-xl"
        [ngClass]="active ? 'pi-moon' : 'pi-sun'"
        ></i>
      </a>
      
      <a
        pRipple
        class="cursor-pointer inline-flex align-items-center justify-content-center border-2 border-pink-600 hover:bg-pink-600 text-600 transition-colors transition-duration-150 border-circle"
        [ngClass]="
          active
            ? 'bg-white text-black-alpha-80 border-black-alpha-80 hover:bg-black-alpha-80 hover:text-white'
            : 'bg-gray-900 text-white-alpha-80 border-white hover:bg-white hover:text-black-alpha-80'
        "
        style="width: 40px; height: 40px"

      >
        <i class="pi pi-sign-out text-xl"></i>
      </a>
    </div>
  </div>
</div>
