<div class="card-curso my-5">
  <div
    class="card-inner"
    [style.--dynamic-hover-color]="primary_color"
    [style.--dynamic-hover-color-sec]="secondary_color"
  >
    <div class="card-face card-front">
      <img
        *ngIf="curso.imagen"
        [src]="curso.imagen"
        alt="Curso banner"
        class="curso-image-full"
      />
      <img
        *ngIf="!curso.imagen"
        src="/assets/img/placeholder.webp"
        alt="Curso banner"
        class="curso-image-full"
      />
      <div class="card-overlay"></div>

      <div class="card-rating">
        <div class="custom-rating-tag">
          <i class="pi pi-star-fill rating-icon"></i>
          <span>5.0</span>
        </div>
      </div>

      <div class="card-bottom">
        <div class="curso-title-sm">{{ curso.nombre }}</div>
        <div class="flex flex-wrap gap-2 mt-2">
          <div class="custom-tag grey-tag">Riesgos cibernéticos</div>
          <div class="custom-tag green-outline-tag">Niños</div>
          <div class="custom-tag grey-tag">+1</div>
        </div>
      </div>
    </div>

    <div class="card-face card-back" [style.background]="'#1f1f1f'">
      <div class="card-back-inner">
      <div class="card-back-banner">
        <img
          [src]="curso.imagen.startsWith('https') ? curso.imagen : '/assets/loaders/bottle-loader.gif'"
          class="curso-back-image"
          [alt]="'Imagen de ' + curso.nombre"
        />
        <div class="precio-pill">Col$ {{ curso.precio }}</div>
      </div>

      <div class="card-back-title">
        <h2 class="curso-back-titulo">{{ curso.nombre }}</h2>

        <div class="card-back-rating">
          <div class="rating-stars-container">
            <i class="pi pi-star-fill"></i>
            <i class="pi pi-star-fill"></i>
            <i class="pi pi-star-fill"></i>
            <i class="pi pi-star-fill"></i>
            <i class="pi pi-star-fill"></i>
          </div>
          <div class="rating-text">
            <strong>5.0</strong>
            <span class="rating-link">(Ver reseñas)</span>
          </div>
        </div>
      </div>

      <div class="card-back-content">
          <p class="curso-back-desc">
            {{ truncateWords(curso.descripcion, 20) }}
            <a
              class="link-ver-mas-inline"
              href="#"
              aria-label="Ver más sobre este curso"
              (click)="$event.preventDefault(); irADetalle()"
              (keydown.enter)="$event.preventDefault(); irADetalle()"
              (keydown.space)="$event.preventDefault(); irADetalle()"
            >
              <u>Ver más...</u>
            </a>
          </p>
          <div class="beneficios-section">
            <h2 class="beneficios-title">Beneficios</h2>

            <div class="features-grid-modern">
            <div class="feature-card">
              <i class="pi pi-eye"></i>
              <span>Conciencia Crítica</span>
            </div>
            <div class="feature-card">
              <i class="pi pi-shield"></i>
              <span>Acción Segura</span>
            </div>
            <div class="feature-card">
              <i class="pi pi-users"></i>
              <span>Inclusión Real</span>
            </div>
          </div>
          </div>

          <div class="card-back-footer">
            <button class="btn-carrito-moderno w-full" (click)="agregarAlCarrito()">
              <i class="pi pi-shopping-cart"></i>
              <span>Agregar al carrito</span>
            </button>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>
